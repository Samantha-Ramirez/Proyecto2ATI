{% load i18n %}
<header class="bg-linkedout-orange text-white min-h-[72px] px-4 py-2 flex items-center justify-between gap-2 lg:gap-6">

    <div class="flex items-center gap-2 min-w-[100px] shrink-0">
        {% if back_button %}
        <a href="{% url 'profile' %}" class="text-2xl lg:text-3xl hover:bg-white/10 rounded-full p-1"
            aria-label="{% trans 'Volver' %}">←</a>
        {% endif %}
        <h1 class="text-lg lg:text-3xl font-bold truncate">
            {% if topbar_title %}{{ topbar_title }}{% else %}{% trans 'LinkedOut' %}{% endif %}
        </h1>
    </div>

    <div class="flex-1 flex justify-center gap-2 max-w-2xl">
        {% if desktop_search %}
        <form method="GET" action="{{ request.path }}"
            class="flex items-center bg-white rounded-lg px-2 py-1 border border-gray-300 w-full max-w-[180px] lg:max-w-xs transition-all">
            <span class="text-sm lg:text-xl">🔍</span>

            <input type="text" name="q" value="{{ search_query|default:'' }}"
                placeholder="{% if search_placeholder %}{{ search_placeholder }}{% else %}{% trans 'Buscar' %}{% endif %}"
                class="bg-transparent border-none text-black placeholder-gray-400 outline-none px-1 lg:px-2 w-full text-xs lg:text-base">

            <button type="submit" class="hidden"></button>
        </form>
        {% endif %}
    </div>

</header>
