{% load i18n %}
<header class="bg-linkedout-orange text-white min-h-[72px] px-5 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
        {% if back_button %}
            <button class="text-3xl leading-none" type="button" aria-label="{% trans 'Volver' %}">←</button>
        {% endif %}
        <h1 class="text-2xl lg:text-4xl font-bold truncate">{% if topbar_title %}{{ topbar_title }}{% else %}{% trans 'LinkedOut' %}{% endif %}</h1>
    </div>

    {% if desktop_search %}
        <form class="hidden lg:flex items-center gap-2 bg-white/20 rounded-md px-3 py-2 w-[380px]" role="search">
            <span>🔍</span>
            <input class="w-full bg-transparent outline-none" type="search" placeholder="{% trans 'Buscar' %}">
        </form>
    {% endif %}

    {% if show_search %}
        <form class="flex items-center gap-2 bg-white/20 rounded-md px-3 py-2" role="search">
            <span>🔍</span>
            <input class="w-full bg-transparent outline-none" type="search" placeholder="{% trans 'Buscar mensaje' %}">
        </form>
    {% endif %}

    {% if show_menu %}
        <button class="text-3xl leading-none" type="button" aria-label="{% trans 'Opciones' %}">⋮</button>
    {% endif %}

    <div class="hidden lg:block text-4xl" aria-hidden="true">◯</div>
</header>
