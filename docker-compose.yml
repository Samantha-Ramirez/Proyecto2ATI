services:
    db:
        image: alpine
        volumes:
            - sqlite_data:/data
        command: tail -f /dev/null

    web:
        build: .
        command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
        volumes:
            - .:/app
            - ./db_folder:/app/db_folder
        ports:
            - '8000:8000'
        depends_on:
            - db

volumes:
    sqlite_data:
